name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: clash-cli

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

  build:
    name: Build ${{ matrix.name }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: clash-cli-linux-x86_64.tar.gz
            binary: clash-cli
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: clash-cli-windows-x86_64.zip
            binary: clash-cli.exe
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            archive: clash-cli-macos-x86_64.tar.gz
            binary: clash-cli
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: clash-cli-macos-aarch64.tar.gz
            binary: clash-cli

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          binary="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a "dist/${{ matrix.archive }}" "$binary" README.md
          else
            tar -czf "dist/${{ matrix.archive }}" "$binary" README.md
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move latest tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "$GITHUB_SHA"
          git push origin refs/tags/latest --force

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

      - name: Publish latest prerelease
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest development build
          body: |
            This prerelease is updated automatically from `${{ github.ref_name }}`.

            Commit: ${{ github.sha }}
          prerelease: true
          make_latest: false
          files: dist/*
          fail_on_unmatched_files: true
          overwrite_files: true
